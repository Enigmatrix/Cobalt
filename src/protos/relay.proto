syntax = "proto3";
package relay;
option csharp_namespace = "Cobalt.Common.Communication.Raw";

service Relay {
    rpc Usages (Empty) returns (stream UsageSwitch);
    rpc AppUpdates (Empty) returns (stream AppId);
}

message Empty {}

message UsageSwitch {
    int64 prev_usage_id = 1;
    int64 prev_sess_id = 2;
    int64 prev_app_id = 3;

    int64 new_sess_id = 4;
    int64 new_app_id = 5;
}

message AppId {
    int64 app_id = 1;
}