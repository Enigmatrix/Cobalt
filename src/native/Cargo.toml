[package]
name = "native"
version = "0.1.0"
authors = ["Enigmatrix <enigmatrix2000@gmail.com>"]
edition = "2018"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
winapi = { version = "0.3", features = ["everything", "impl-default", "impl-debug"] }
ntapi = { version = "0.3", features = ["user", "impl-default"] }
uuid-sys = "0.1"
pelite = "0.9"
image = "0.23"

tracing = "0.1"

anyhow = "1.0"

[dev-dependencies]
tracing-subscriber = "0.2"